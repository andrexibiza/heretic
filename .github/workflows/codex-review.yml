name: Automatic Codex review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  request-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request Codex review once per head commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          marker="<!-- ares-codex-review:${HEAD_SHA} -->"
          already_requested="$(gh api --paginate             "repos/${GH_REPO}/issues/${PR_NUMBER}/comments"             --jq "any(.[]; .body | contains(\"${marker}\"))")"
          if [ "${already_requested}" = "true" ]; then
            echo "Codex review already requested for ${HEAD_SHA}."
            exit 0
          fi
          gh api --method POST             "repos/${GH_REPO}/issues/${PR_NUMBER}/comments"             -f body="${marker}
          @codex review"
